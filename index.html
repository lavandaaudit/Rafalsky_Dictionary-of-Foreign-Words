<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rafalsky Dictionary — Global Zen</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Almendra:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IM+Fell+English:ital@0;1&family=Marck+Script&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Spectral:ital,wght@0,400;0,700;1,400&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="size-md">

  <canvas id="particle-canvas"></canvas>

  <header class="site-header">
    <div class="logo-block">
      <div class="logo-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="36" height="36" rx="2" stroke="#c8a96e" stroke-width="1.5"/>
          <path d="M12 12L28 28M28 12L12 28" stroke="#c8a96e" stroke-width="1"/>
          <circle cx="20" cy="20" r="4" fill="#080808" stroke="#c8a96e"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-line1">СЛОВНИК</span>
        <span class="logo-line2">РАФАЛЬСЬКОГО</span>
        <span class="logo-line3">EST. 2024</span>
      </div>
    </div>
    <!-- Buttons removed for Zen mode -->
  </header>

  <main class="word-stage" id="main-stage">
    <div class="word-card" id="word-card">
      <div class="word-origin" id="word-origin">Архів завантажується...</div>
      <h1 class="word-title" id="word-title">—</h1>
      <div class="word-definition" id="word-definition">Будь ласка, зачекайте...</div>
      
      <div class="word-meta">
        <div class="word-counter" id="word-counter">Global Index 200k+</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-left">Slovnyk.me · Wikipedia · Rafalsky Edition</div>
    <div class="footer-right">Zen Mode: Active</div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
